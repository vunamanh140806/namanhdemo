{% extends 'base.html' %}

{% block title %}Thêm thành công - NTSale{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6 text-center">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <div class="mb-4 text-success">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                </div>
                <h2 class="h3 mb-3">Thêm sản phẩm thành công!</h2>
                <p class="text-muted mb-4">Sản phẩm mới của bạn đã được ghi nhận vào hệ thống cơ sở dữ liệu.</p>
                <div>
                    <a href="{% url 'add_product' %}" class="btn btn-primary me-2">Thêm tiếp</a>
                    <a href="{% url 'index' %}" class="btn btn-outline-secondary">Về Trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
